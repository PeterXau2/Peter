<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Website</title>

<style>
/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

/* BODY */
body{
background:#0f172a;
color:white;
transition:0.3s;
}

/* LIGHT MODE */
body.light{
background:white;
color:black;
}

/* NAVBAR */
nav{
display:flex;
justify-content:space-between;
padding:15px 30px;
background:#1e293b;
position:sticky;
top:0;
}

nav h2{
color:#38bdf8;
}

nav button{
padding:8px 12px;
border:none;
cursor:pointer;
}

/* HERO */
.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:40px;
margin-bottom:10px;
}

.hero p{
opacity:0.7;
}

/* BUTTON */
.btn{
margin-top:20px;
padding:10px 20px;
background:#38bdf8;
border:none;
cursor:pointer;
}

/* SECTION */
.section{
padding:60px 20px;
text-align:center;
}

/* CARD */
.card{
background:#1e293b;
padding:20px;
margin:15px;
border-radius:10px;
display:inline-block;
width:250px;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

/* LIGHT CARD */
body.light .card{
background:#f1f5f9;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
background:#1e293b;
margin-top:40px;
}
</style>

</head>
<body>

<!-- NAV -->
<nav>
<h2>DonnyDev</h2>
<button onclick="toggleTheme()">🌙 Toggle</button>
</nav>

<!-- HERO -->
<div class="hero">
<h1 id="typing"></h1>
<p>I build websites and apps</p>
<button class="btn">Get Started</button>
</div>

<!-- SERVICES -->
<div class="section">
<h2>My Services</h2>

<div class="card">Web Design</div>
<div class="card">App Development</div>
<div class="card">Trading Analysis</div>

</div>

<!-- FOOTER -->
<footer>
<p>© 2026 DonnyDev</p>
</footer>

<script>

// DARK / LIGHT MODE
function toggleTheme(){
document.body.classList.toggle("light")
}

// TYPING EFFECT
const text = "Welcome to My Website"
let i = 0

function typing(){
if(i < text.length){
document.getElementById("typing").innerHTML += text.charAt(i)
i++
setTimeout(typing, 50)
}
}

typing()

</script>

</body>
</html>
